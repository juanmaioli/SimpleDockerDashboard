services:
  simpledockerdashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simpledockerdashboard
    restart: always
    volumes:
      - ./www_data:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASS=${DASHBOARD_PASS}
    ports:
      - "6080:80"
